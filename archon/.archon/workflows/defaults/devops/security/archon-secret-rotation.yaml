# archon-secret-rotation
# Rotate a managed secret with explicit approval, execute the rotation,
# verify consumer health, and record the audit trail.

name: secret-rotation
description: |
  Rotate a secret in Vault or the configured secret manager, then verify that consuming
  services remain healthy. Use when performing routine credential rotation or responding
  to a suspected secret leak. This workflow plans the rotation, requires human approval,
  executes the change, and records an audit artifact.
  NOT for: read-only secret audits or compliance scans.
version: 1.0.0

environment: $ENVIRONMENT

nodes:
  - id: preflight
    command: devops-preflight
    context: fresh

  - id: identify-consumers
    prompt: |
      Analyze the secret rotation request in $ARGUMENTS.

      Identify:
      - the likely secret being rotated
      - the consuming services or jobs
      - the expected blast radius if rotation fails
      - the safest verification path after rotation

      Write the summary to $ARTIFACTS_DIR/secret-rotation-plan.md.
    depends_on: [preflight]
    context: fresh

  - id: approval
    approval:
      message: |
        ## Secret Rotation Approval Required

        **Environment:** $ENVIRONMENT
        **Request:** $ARGUMENTS

        Review the consumer and blast radius summary in:
        $ARTIFACTS_DIR/secret-rotation-plan.md

        Approve only if the rollback and verification steps are acceptable.
      capture_response: true
    depends_on: [identify-consumers]

  - id: rotate-secret
    command: secret-rotation-execute
    depends_on: [approval]
    context: fresh

  - id: verify-consumers
    loop:
      prompt: |
        Verify that services depending on the rotated secret remain healthy.

        Read:
        - $ARTIFACTS_DIR/secret-rotation-plan.md
        - any execution artifact produced by secret-rotation-execute

        If all known consumers are healthy, emit <promise>HEALTHY</promise>.
        If rotation caused failures or auth errors, emit <promise>DEGRADED</promise>.
        If more observation time is needed, emit nothing so the loop retries.
      until: HEALTHY|DEGRADED
      max_iterations: 10
      fresh_context: true
    depends_on: [rotate-secret]

  - id: audit-log
    bash: |
      cat > "$ARTIFACTS_DIR/secret-rotation-audit.json" << EOF
      {
        "environment": "$ENVIRONMENT",
        "request": "$ARGUMENTS",
        "verification_status": "$verify-consumers.output",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
      EOF
    depends_on: [verify-consumers]
    context: fresh
    trigger_rule: all_done

  - id: notify
    command: notify-security-findings
    depends_on: [audit-log]
    context: fresh
    trigger_rule: all_done
